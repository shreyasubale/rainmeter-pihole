MeterStyle=StyleButton
X=250
Y=86
W=30
H=20
FontColor=#EnabledColor#
Text=ON
LeftMouseUpAction=[!CommandMeasure MeasureEnable1 "Run"]
MouseOverAction=[!SetOption MeterBtnEnable1 FontColor #AccentColor#][!UpdateMeter MeterBtnEnable1][!Redraw]
MouseLeaveAction=[!SetOption MeterBtnEnable1 FontColor #EnabledColor#][!UpdateMeter MeterBtnEnable1][!Redraw]

[MeterSep1]
Meter=Shape
Shape=Rectangle 15,112,(#SkinWidth# - 30),1 | Fill Color 40,40,55 | StrokeWidth 0

