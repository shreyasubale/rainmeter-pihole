;============================================================
; Pi-hole Manager — Rainmeter Skin
; Monitors and controls multiple Pi-hole instances
; With in-widget settings editor
;============================================================

[Rainmeter]
Update=5000
AccurateText=1
DynamicWindowSize=1

@includeVars=#@#..\PiholeVariables.inc

[Variables]
ShowSettings=0

;------------------------------------------------------------
; STYLES
;------------------------------------------------------------

[StyleText]
FontFace=#FontFace#
FontSize=#FontSize#
FontColor=#TextColor#
AntiAlias=1

[StyleTextDim]
FontFace=#FontFace#
FontSize=#FontSizeSmall#
FontColor=#DimTextColor#
AntiAlias=1

[StyleHeader]
FontFace=#FontFace#
FontSize=#FontSizeLarge#
FontWeight=600
FontColor=#HeaderColor#
AntiAlias=1

[StyleButton]
FontFace=#FontFace#
FontSize=#FontSizeSmall#
FontColor=#TextColor#
AntiAlias=1
StringAlign=Center

[StyleSettingsLabel]
FontFace=#FontFace#
FontSize=#FontSizeSmall#
FontColor=#DimTextColor#
AntiAlias=1

[StyleSettingsValue]
FontFace=#FontFace#
FontSize=#FontSizeSmall#
FontColor=#AccentColor#
AntiAlias=1
ClipString=1

;------------------------------------------------------------
; INPUT TEXT PLUGIN — for inline editing
;------------------------------------------------------------

[MeasureInputPiholeCount]
Measure=Plugin
Plugin=InputText
X=120
Y=0
W=140
H=20
FontFace=#FontFace#
FontSize=10
FontColor=255,255,255
SolidColor=40,40,55
DefaultValue=#PiholeCount#
Command1=[!WriteKeyValue Variables PiholeCount "$UserInput$" "#@#..\PiholeVariables.inc"][!Refresh]

[MeasureInputName1]
Measure=Plugin
Plugin=InputText
X=120
Y=0
W=140
H=20
FontFace=#FontFace#
FontSize=10
FontColor=255,255,255
SolidColor=40,40,55
DefaultValue=#PiholeName1#
Command1=[!WriteKeyValue Variables PiholeName1 "$UserInput$" "#@#..\PiholeVariables.inc"][!Refresh]

