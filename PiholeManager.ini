;------------------------------------------------------------
; BACKGROUND
;------------------------------------------------------------

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#SkinWidth#,([MeterEnd:Y] + 15),8 | Fill Color #BackgroundColor# | StrokeWidth 1 | Stroke Color 50,50,65
DynamicVariables=1

;------------------------------------------------------------
; HEADER
;------------------------------------------------------------

[MeterTitle]
Meter=String
MeterStyle=StyleHeader
X=15
Y=12
Text=Pi-hole Manager

[MeterGearBtn]
Meter=String
MeterStyle=StyleText
X=(#SkinWidth# - 20)
Y=14
FontSize=13
FontColor=#DimTextColor#
StringAlign=Center
Text=[\x2699]
ToolTipText=Settings
DynamicVariables=1
LeftMouseUpAction=[!SetVariable ShowSettings "(1 - #ShowSettings#)"][!UpdateMeterGroup SettingsGroup][!UpdateMeter MeterEnd][!UpdateMeter MeterBackground][!UpdateMeterGroup MainGroup][!UpdateMeterGroup BottomGroup][!Redraw]
MouseOverAction=[!SetOption MeterGearBtn FontColor #AccentColor#][!UpdateMeter MeterGearBtn][!Redraw]
MouseLeaveAction=[!SetOption MeterGearBtn FontColor #DimTextColor#][!UpdateMeter MeterGearBtn][!Redraw]

[MeterHeaderLine]
Meter=Shape
Shape=Rectangle 15,38,(#SkinWidth# - 30),1 | Fill Color 50,50,65 | StrokeWidth 0

