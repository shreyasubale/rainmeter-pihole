;============================================================
; MAIN VIEW — Pi-hole instances
;============================================================

; Y offset for main content depends on settings panel
; BaseY = settings end Y + 8

;============================================================
; INSTANCE 1
;============================================================

[MeasureStatus1]
Measure=Plugin
Plugin=RunCommand
Program=PowerShell
Parameter=-NoProfile -ExecutionPolicy Bypass -File "#@#PiholeAPI.ps1" -Action status -URL "#PiholeURL1#" -Token "#PiholeToken1#"
OutputType=ANSI
State=Hide
UpdateDivider=6
FinishAction=[!UpdateMeter "MeterStatus1"][!UpdateMeter "MeterStatusDot1"][!Redraw]

[MeasureDisable1]
Measure=Plugin
Plugin=RunCommand
Program=PowerShell
Parameter=-NoProfile -ExecutionPolicy Bypass -File "#@#PiholeAPI.ps1" -Action disable -URL "#PiholeURL1#" -Token "#PiholeToken1#" -Minutes [#SelectedTime1]
DynamicVariables=1
OutputType=ANSI
State=Hide
FinishAction=[!CommandMeasure MeasureStatus1 "Run"]

[MeasureEnable1]
Measure=Plugin
Plugin=RunCommand
Program=PowerShell
Parameter=-NoProfile -ExecutionPolicy Bypass -File "#@#PiholeAPI.ps1" -Action enable -URL "#PiholeURL1#" -Token "#PiholeToken1#"
OutputType=ANSI
State=Hide
FinishAction=[!CommandMeasure MeasureStatus1 "Run"]

[MeterName1]
Meter=String
MeterStyle=StyleText
X=15
Y=([MeterSettingsEnd:Y] + 8)
FontWeight=600
Text=#PiholeName1#
Group=MainGroup
DynamicVariables=1

[MeterStatusDot1]
Meter=Shape
Shape=Ellipse 0,0,5 | Fill Color ([MeasureStatus1] = 'enabled' ? #EnabledColor# : ([MeasureStatus1] = 'disabled' ? #DisabledColor# : #DimTextColor#)) | StrokeWidth 0
X=(#SkinWidth# - 25)
Y=([MeterSettingsEnd:Y] + 13)
Group=MainGroup
DynamicVariables=1

[MeterStatus1]
