DynamicVariables=1
LeftMouseUpAction=[!SetVariable SelectedTime1 #DisableTime4#][!CommandMeasure MeasureDisable1 "Run"]
MouseOverAction=[!SetOption MeterBtnDisable1_4 FontColor #AccentColor#][!UpdateMeter MeterBtnDisable1_4][!Redraw]
MouseLeaveAction=[!SetOption MeterBtnDisable1_4 FontColor #TextColor#][!UpdateMeter MeterBtnDisable1_4][!Redraw]

[MeterBtnEnable1]
