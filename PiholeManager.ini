;============================================================
; Pi-hole Manager — Rainmeter Skin
; Monitors and controls multiple Pi-hole instances
; With in-widget settings editor
;============================================================

[Rainmeter]
Update=5000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1

@includeVars=#@#..\PiholeVariables.inc

[Variables]
ShowSettings=0
SelectedTime1=5
SelectedTime2=5
SelectedTime3=5
SelectedTime4=5

;------------------------------------------------------------
; STYLES
;------------------------------------------------------------

[StyleText]
FontFace=#FontFace#
FontSize=#FontSize#
FontColor=#TextColor#
AntiAlias=1
DynamicVariables=1

[StyleTextDim]
FontFace=#FontFace#
FontSize=#FontSizeSmall#
FontColor=#DimTextColor#
AntiAlias=1
DynamicVariables=1

[StyleHeader]
FontFace=#FontFace#
FontSize=#FontSizeLarge#
FontWeight=600
FontColor=#HeaderColor#
AntiAlias=1

[StyleButton]
FontFace=#FontFace#
FontSize=#FontSizeSmall#
FontColor=#TextColor#
AntiAlias=1
StringAlign=Center
DynamicVariables=1

[StyleSettingsLabel]
FontFace=#FontFace#
FontSize=#FontSizeSmall#
FontColor=#DimTextColor#
AntiAlias=1
DynamicVariables=1
W=85

[StyleSettingsValue]
FontFace=#FontFace#
FontSize=#FontSizeSmall#
FontColor=#AccentColor#
AntiAlias=1
DynamicVariables=1
W=140
ClipString=1

;------------------------------------------------------------
; SHARED INPUT TEXT — repositioned dynamically before use
;------------------------------------------------------------

[MeasureInput]
Measure=Plugin
Plugin=InputText
W=145
H=18
FontFace=#FontFace#
FontSize=9
FontColor=255,255,255
SolidColor=40,40,60
FocusDismiss=1
DynamicVariables=1
X=0
Y=0
DefaultValue=""
Command1=[!WriteKeyValue Variables "#*InputKey*#" "$UserInput$" "#@#..\PiholeVariables.inc"][!Refresh]

;------------------------------------------------------------
; BACKGROUND — drawn as a shape, positioned at 0,0
;------------------------------------------------------------

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#SkinWidth#,([MeterEnd:Y]),8 | Fill Color #BackgroundColor# | StrokeWidth 1 | Stroke Color 50,50,65
DynamicVariables=1

;------------------------------------------------------------
; HEADER
;------------------------------------------------------------

[MeterTitle]
Meter=String
MeterStyle=StyleHeader
X=15
Y=12
Text=Pi-hole Manager

[MeterGearBtn]
Meter=String
FontFace=Segoe UI Symbol
FontSize=14
FontColor=#DimTextColor#
AntiAlias=1
StringAlign=Center
X=(#SkinWidth# - 22)
Y=10
Text=[\x2699]
ToolTipText=Settings
DynamicVariables=1
LeftMouseUpAction=[!SetVariable ShowSettings "(1 - #ShowSettings#)"][!Refresh]
MouseOverAction=[!SetOption MeterGearBtn FontColor #AccentColor#][!UpdateMeter MeterGearBtn][!Redraw]
MouseLeaveAction=[!SetOption MeterGearBtn FontColor #DimTextColor#][!UpdateMeter MeterGearBtn][!Redraw]

[MeterHeaderLine]
Meter=Shape
Shape=Rectangle 15,38,(#SkinWidth# - 30),1 | Fill Color 50,50,65 | StrokeWidth 0

;============================================================
; SETTINGS PANEL
;============================================================

