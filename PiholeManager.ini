;============================================================
; Pi-hole Manager — Rainmeter Skin
; Monitors and controls multiple Pi-hole instances
;============================================================

[Rainmeter]
Update=5000
AccurateText=1
DynamicWindowSize=1

@includeVars=#@#..\PiholeVariables.inc

;------------------------------------------------------------
; STYLES
;------------------------------------------------------------

[StyleText]
FontFace=#FontFace#
FontSize=#FontSize#
FontColor=#TextColor#
AntiAlias=1

[StyleTextDim]
FontFace=#FontFace#
FontSize=#FontSizeSmall#
FontColor=#DimTextColor#
AntiAlias=1

[StyleHeader]
FontFace=#FontFace#
FontSize=#FontSizeLarge#
FontWeight=600
FontColor=#HeaderColor#
AntiAlias=1

[StyleButton]
FontFace=#FontFace#
FontSize=#FontSizeSmall#
FontColor=#TextColor#
AntiAlias=1
StringAlign=Center

;------------------------------------------------------------
; BACKGROUND
;------------------------------------------------------------

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#SkinWidth#,([MeterEnd:Y]),8 | Fill Color #BackgroundColor# | StrokeWidth 1 | Stroke Color 50,50,65
DynamicVariables=1

;------------------------------------------------------------
; HEADER
;------------------------------------------------------------

[MeterTitle]
Meter=String
MeterStyle=StyleHeader
X=15
Y=12
Text=Pi-hole Manager

[MeterHeaderLine]
Meter=Shape
Shape=Rectangle 15,38,(#SkinWidth# - 30),1 | Fill Color 50,50,65 | StrokeWidth 0

;============================================================
; INSTANCE 1
;============================================================

[MeasureStatus1]
Measure=Plugin
Plugin=RunCommand
Program=PowerShell
Parameter=-NoProfile -ExecutionPolicy Bypass -File "#@#PiholeAPI.ps1" -Action status -URL "#PiholeURL1#" -Token "#PiholeToken1#"
OutputType=ANSI
State=Hide
UpdateDivider=6
FinishAction=[!UpdateMeter "MeterStatus1"][!UpdateMeter "MeterStatusDot1"][!Redraw]

[MeasureDisable1]
Measure=Plugin
Plugin=RunCommand
Program=PowerShell
Parameter=-NoProfile -ExecutionPolicy Bypass -File "#@#PiholeAPI.ps1" -Action disable -URL "#PiholeURL1#" -Token "#PiholeToken1#" -Minutes [#SelectedTime1]
DynamicVariables=1
OutputType=ANSI
State=Hide
FinishAction=[!CommandMeasure MeasureStatus1 "Run"]

[MeasureEnable1]
Measure=Plugin
Plugin=RunCommand
Program=PowerShell
Parameter=-NoProfile -ExecutionPolicy Bypass -File "#@#PiholeAPI.ps1" -Action enable -URL "#PiholeURL1#" -Token "#PiholeToken1#"
OutputType=ANSI
State=Hide
FinishAction=[!CommandMeasure MeasureStatus1 "Run"]

[MeterName1]
Meter=String
MeterStyle=StyleText
X=15
Y=50
FontWeight=600
Text=#PiholeName1#

[MeterStatusDot1]
Meter=Shape
Shape=Ellipse 0,0,5 | Fill Color ([MeasureStatus1] = 'enabled' ? #EnabledColor# : ([MeasureStatus1] = 'disabled' ? #DisabledColor# : #DimTextColor#)) | StrokeWidth 0
X=(#SkinWidth# - 25)
Y=55
DynamicVariables=1

[MeterStatus1]
Meter=String
MeterStyle=StyleTextDim
X=15
Y=68
Text=Status: [MeasureStatus1]
DynamicVariables=1

; --- Disable buttons for instance 1 ---

[MeterDisableLabel1]
Meter=String
MeterStyle=StyleTextDim
X=15
Y=88
Text=Disable:

[MeterBtnDisable1_1]
Meter=String
MeterStyle=StyleButton
X=85
Y=86
W=40
H=20
Text=#DisableTime1#m
DynamicVariables=1
LeftMouseUpAction=[!SetVariable SelectedTime1 #DisableTime1#][!CommandMeasure MeasureDisable1 "Run"]
MouseOverAction=[!SetOption MeterBtnDisable1_1 FontColor #AccentColor#][!UpdateMeter MeterBtnDisable1_1][!Redraw]
MouseLeaveAction=[!SetOption MeterBtnDisable1_1 FontColor #TextColor#][!UpdateMeter MeterBtnDisable1_1][!Redraw]

[MeterBtnDisable1_2]
Meter=String
MeterStyle=StyleButton
X=125
Y=86
W=40
H=20
Text=#DisableTime2#m
DynamicVariables=1
LeftMouseUpAction=[!SetVariable SelectedTime1 #DisableTime2#][!CommandMeasure MeasureDisable1 "Run"]
MouseOverAction=[!SetOption MeterBtnDisable1_2 FontColor #AccentColor#][!UpdateMeter MeterBtnDisable1_2][!Redraw]
MouseLeaveAction=[!SetOption MeterBtnDisable1_2 FontColor #TextColor#][!UpdateMeter MeterBtnDisable1_2][!Redraw]

[MeterBtnDisable1_3]
Meter=String
MeterStyle=StyleButton
X=165
Y=86
W=40
H=20
Text=#DisableTime3#m
DynamicVariables=1
LeftMouseUpAction=[!SetVariable SelectedTime1 #DisableTime3#][!CommandMeasure MeasureDisable1 "Run"]
MouseOverAction=[!SetOption MeterBtnDisable1_3 FontColor #AccentColor#][!UpdateMeter MeterBtnDisable1_3][!Redraw]
MouseLeaveAction=[!SetOption MeterBtnDisable1_3 FontColor #TextColor#][!UpdateMeter MeterBtnDisable1_3][!Redraw]

[MeterBtnDisable1_4]
