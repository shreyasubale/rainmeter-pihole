Hidden=(1 - #ShowSettings#)
DynamicVariables=1

;============================================================
; MAIN CONTENT — Y origin shifts based on settings visibility
;============================================================
; MainY = 46 when settings hidden
; MainY = offset after settings when shown

[MeasureMainY]
Measure=Calc
Formula=(#ShowSettings# = 0 ? 46 : (#PiholeCount# < 2 ? 206 : (#PiholeCount# < 3 ? 289 : (#PiholeCount# < 4 ? 372 : 455))))
DynamicVariables=1

;============================================================
; INSTANCE 1
;============================================================

[MeasureStatus1]
Measure=Plugin
Plugin=RunCommand
Program=PowerShell
Parameter=-NoProfile -ExecutionPolicy Bypass -File "#@#PiholeAPI.ps1" -Action status -URL "#PiholeURL1#" -Token "#PiholeToken1#"
OutputType=ANSI
State=Hide
UpdateDivider=6
FinishAction=[!UpdateMeter "MeterStatus1"][!UpdateMeter "MeterStatusDot1"][!Redraw]

[MeasureDisable1]
Measure=Plugin
Plugin=RunCommand
Program=PowerShell
Parameter=-NoProfile -ExecutionPolicy Bypass -File "#@#PiholeAPI.ps1" -Action disable -URL "#PiholeURL1#" -Token "#PiholeToken1#" -Minutes #SelectedTime1#
DynamicVariables=1
OutputType=ANSI
State=Hide
FinishAction=[!CommandMeasure MeasureStatus1 "Run"]

[MeasureEnable1]
Measure=Plugin
Plugin=RunCommand
Program=PowerShell
Parameter=-NoProfile -ExecutionPolicy Bypass -File "#@#PiholeAPI.ps1" -Action enable -URL "#PiholeURL1#" -Token "#PiholeToken1#"
OutputType=ANSI
State=Hide
FinishAction=[!CommandMeasure MeasureStatus1 "Run"]

[MeterName1]
Meter=String
MeterStyle=StyleText
X=15
Y=[MeasureMainY]
FontWeight=600
Text=#PiholeName1#
DynamicVariables=1

[MeterStatusDot1]
Meter=Shape
Shape=Ellipse 0,0,5 | Fill Color ([MeasureStatus1] = 'enabled' ? #EnabledColor# : ([MeasureStatus1] = 'disabled' ? #DisabledColor# : #DimTextColor#)) | StrokeWidth 0
X=(#SkinWidth# - 25)
Y=([MeasureMainY] + 5)
DynamicVariables=1

[MeterStatus1]
Meter=String
MeterStyle=StyleTextDim
X=15
Y=([MeasureMainY] + 18)
Text=Status: [MeasureStatus1]
DynamicVariables=1

[MeterDisableLabel1]
Meter=String
MeterStyle=StyleTextDim
X=15
Y=([MeasureMainY] + 38)
Text=Disable:
DynamicVariables=1

[MeterBtnDisable1_1]
Meter=String
